name: tahadi_al_abqari
description: تحدي العباقرة - العب، تحدى، اكسب
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # اللي عندك أصلاً
  shared_preferences: ^2.2.2
  audioplayers: ^5.2.1
  lottie: ^2.7.0
  
  # Firebase
  firebase_core: ^2.32.0
  cloud_firestore: ^4.17.5
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/questions.json
    - assets/image_questions.json
    - assets/sounds/
    - assets/icon.png

# إعدادات الأيقونة
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#6A11CB"
    theme_color: "#2575FC"
