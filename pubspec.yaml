name: tahadi_al_abqari
description: تحدي العباقرة - العب، تحدى، اكسب
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  
  # محدثات عشان تتوافق ويا Gradle 8
  shared_preferences: ^2.3.3
  audioplayers: ^5.2.1
  lottie: ^3.1.2
  
  # Firebase محدث
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  share_plus: ^12.0.4
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/questions.json
    - assets/image_questions.json
    - assets/sounds/
    - assets/icon.png

# إعدادات الأيقونة
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#6A11CB"
    theme_color: "#2575FC"
