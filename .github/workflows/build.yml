name: Build Signed APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -storepass android -keypass android -dname "CN=tahadi, OU=tahadi, O=tahadi, L=Baghdad, ST=Baghdad, C=IQ"
          
      - name: Create key.properties
        run: |
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
          
      - name: Flutter Clean
        run: flutter clean
        
      - run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
        
      - uses: actions/upload-artifact@v4
        with:
          name: tahadi-release-apk
          path: |
            android/app/build/outputs/flutter-apk/app-release.apk
            android/app/build/outputs/apk/release/app-release.apk
